<table width="100%" bgcolor="#fff2cc" cellpadding="0" cellspacing="0" border="0">
<tr><td align="center">
<br>
<table width="95%" cellpadding="0" cellspacing="0" border="0">
<tr><td align="center">

<p id="error" style="color:red;font-weight:bold;display:none;"></p>

<table class="text" cellpadding="3" cellspacing="2" border="0">
<form id="register-form">
<tr valign="top"><td align="right">Ник:</td><td><input type="text" name="name" maxlength="20" class="chatInput" style="width:180px;" required></td></tr>
<tr valign="top"><td align="right">Пароль:</td><td><input type="password" name="password" maxlength="50" class="chatInput" style="width:180px;" required></td></tr>
<tr valign="top"><td align="right">Пароль ещё раз:</td><td><input type="password" name="password2" maxlength="50" class="chatInput" style="width:180px;" required></td></tr>
<tr valign="top"><td align="right">Имя:</td><td><input type="text" name="realName" maxlength="50" class="chatInput" style="width:180px;"></td></tr>
<tr valign="top"><td align="right">Пол:</td><td>
<select name="gender" class="chatInput" style="width:180px;" required>
<option value="m">мужской</option>
<option value="f">женский</option>
</select></td></tr>
<tr valign="top"><td align="right">Родился:</td><td><input type="date" name="birthdate" class="chatInput" style="width:180px;"></td></tr>
<tr valign="top"><td align="right">e-mail:</td><td><input type="email" name="email" maxlength="50" class="chatInput" style="width:180px;"></td></tr>
<tr valign="top"><td align="right">Немного о себе:</td><td><textarea name="about" rows="6" maxlength="230" class="registrationtextarea chatInput" style="width:180px;"></textarea></td></tr>
<tr valign="top"><td align="right">Цвет ника:</td><td>
<select name="color" class="chatInput" style="width:180px;">
<option value="#008000">Зелёный</option>
<option value="#3366ff">Синий</option>
<option value="#cc0000">Красный</option>
<option value="#000000" selected>Чёрный</option>
<option value="#cc0099">Розовый</option>
<option value="#990099">Фиолетовый</option>
<option value="#cc6600">Оранжевый</option>
<option value="#808080">Серый</option>
</select></td></tr>
<tr><td colspan="2" align="center"><br>
<input type="submit" value="Зарегистрироваться" class="chatInput" style="width:200px;">
<br><br>
<font size="-1"><a href="/">← Уже есть аккаунт? Войти</a></font>
</td></tr>
</form>
