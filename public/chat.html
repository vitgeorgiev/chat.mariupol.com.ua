<script type="module">
import { renderSmileys } from '/js/smileys.js';

const params = new URLSearchParams(window.location.search);
const name = params.get('name');
const channel = params.get('channel');

if (!name || !channel) {
  window.location.href = '/';
}

document.getElementById('channel-name-small').textContent =
  { '28763': 'Городском саду', '28773': 'Квартале свиданий', '28774': 'Неадминистрируемом',
    '28775': 'Карточном домике', '28776': 'Закрытом канале' }[channel] || 'чате';

let ws;
const messagesEl = document.getElementById('messages');
const usersEl = document.getElementById('users');
const inputEl = document.getElementById('message-input');
const channelNameEl = document.getElementById('channel-name');
const userCountEl = document.getElementById('user-count');

function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', name, channel }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'message') addMessage(data);
    if (data.type === 'users') updateUsers(data.users);
    if (data.type === 'history') {
      channelNameEl.textContent = data.channelName;
      document.title = `${data.channelName} — Мариупольский городской чат V2.31`;
    }
  };

  ws.onclose = () => setTimeout(connect, 2000);
}

function addMessage({ time, nick, text, system }) {
  const div = document.createElement('div');
  if (system) {
    div.className = 'msg-system';
    div.innerHTML = `<span class="msg-time">[${time}]</span> ${esc(text)}`;
  } else {
    div.innerHTML =
      `<span class="msg-time">[${time}]</span> ` +
      `<span class="msg-nick">${esc(nick)}:</span> ` +
      renderSmileys(text);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateUsers(users) {
  userCountEl.textContent = users.length;
  usersEl.innerHTML = users.map((u) => `<div class="user-nick">${esc(u)}</div>`).join('');
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  inputEl.value = '';
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

document.getElementById('send-btn').addEventListener('click', sendMessage);

window.addEventListener('beforeunload', () => {
  if (ws?.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'leave' }));
  }
});

connect();
</script>
