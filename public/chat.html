<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Language" content="ru">
<title>Чат — Мариупольский городской чат V2.31</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/chat.css">
</head>
<body class="chat-room" bgcolor="#fff6d5">

<div class="chat-header">
  <div class="header-left">
    <div class="mgch-logo">МГЧ<sup>™</sup></div>
    <div class="channel-switch">
      <select id="channel-select" class="chatInput">
        <option value="28763">В Городской сад</option>
        <option value="28773">В Квартал свиданий</option>
        <option value="28774">В Неадминистрируемый</option>
        <option value="28775">В Карточный домик</option>
        <option value="28776">В (*) Закрытый канал</option>
      </select>
      <input type="button" id="channel-go" value="перейти" class="chatInput">
    </div>
  </div>
  <nav class="header-nav" aria-label="Навигация">
    <a href="#" id="temp-out-link">отсутствовать</a>
    <a href="/settings.html" id="settings-link">настройки</a>
    <a href="/profile.html" id="my-info-link">моя инфа</a>
    <a href="#">архив</a>
    <a href="#">почта</a>
    <a href="#">правила</a>
    <a href="#" class="nav-secondary">покер</a>
    <a href="#" class="nav-secondary">фото</a>
    <a href="#" class="nav-secondary">логи</a>
  </nav>
</div>

<div class="chat-main">
  <div id="messages" class="chat-output"></div>
</div>

<aside class="chat-names" id="chat-names-panel">
  <button type="button" id="users-toggle" class="users-toggle" aria-expanded="false">
    <span id="users-toggle-label">участники</span>
  </button>
  <div class="names-title">в <span id="channel-locative-side">...</span></div>
  <div id="users"></div>
  <div id="away-header" class="away-header" hidden>Временно отсутствуют</div>
  <div id="away-users"></div>
</aside>

<div class="chat-query">
  <form id="query-form" class="query-say" onsubmit="return false">
    <div class="query-say-row">
      <label class="query-action-label"><input type="checkbox" id="action-check" accesskey="д"> Действие</label>
      <button type="submit" form="exit-form" class="exit-btn">Выход</button>
    </div>
    <input type="text" id="text-input" name="textcache" maxlength="500" class="query-text-input" placeholder="Сообщение..." autocomplete="off">
    <div class="query-buttons">
      <input type="submit" value="сказать" class="btn-primary">
      <input type="reset" id="reset-btn" value="сброс">
      <input type="button" id="rus-btn" value="→ рус" accesskey="р">
    </div>
  </form>
  <form id="exit-form" class="exit-form" action="/" method="get" hidden></form>
  <form id="whisper-form" class="query-whisper" onsubmit="return false">
    <span class="whisper-label">На ушко</span>
    <input type="text" id="whisper-to" maxlength="20" class="whisper-to-input" placeholder="ник">
    <input type="text" id="whisper-text" maxlength="500" class="whisper-text-input" placeholder="текст">
    <input type="submit" value="шепнуть" class="btn-whisper">
  </form>
</div>

<script>
(function () {
  var p = new URLSearchParams(location.search);
  var name = p.get('name');
  var channel = p.get('channel');
  if (!name || !channel) return;
  var gender = p.get('gender') === 'f' ? 'f' : 'm';
  var q = new URLSearchParams({ name: name, channel: channel, gender: gender });
  var color = p.get('color');
  if (color) q.set('color', color);
  var link = document.getElementById('settings-link');
  if (link) link.href = '/settings.html?' + q.toString();
})();
</script>
<script type="module" src="/js/chat.js"></script>
</body>
</html>
